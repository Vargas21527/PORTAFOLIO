                      <p className="mt-3 leading-7 text-slate-600">{project.text}</p>
                      <div className="mt-5 flex flex-wrap gap-2">
                        {project.tags.map((tag) => (
                          <span key={tag} className="rounded-lg bg-mist px-3 py-1.5 text-xs font-bold text-navy-800">
                            {tag}
                          </span>
                        ))}
                      </div>
                    </div>
                  </motion.article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function Services() {
        return (
          <section id="servicios" className="bg-navy-950 px-5 py-24 text-white sm:px-6 lg:px-8">
            <div className="mx-auto max-w-7xl">
              <SectionHeading
                kicker="Servicios"
                title="Soporte técnico para avanzar con orden"
                text="Servicios enfocados en entregar información confiable y accionable para diseño, presupuesto y ejecución."
                dark
              />
              <div className="grid gap-5 md:grid-cols-2 lg:grid-cols-4">
                {services.map((service, index) => (
                  <motion.article
                    key={service.title}
                    className="rounded-lg border border-white/10 bg-white/[0.06] p-6 transition hover:-translate-y-1 hover:bg-white/10"
                    initial={{ opacity: 0, y: 22 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true, amount: 0.25 }}
                    transition={{ duration: 0.45, delay: index * 0.05 }}
                  >
                    <div className="mb-5 grid h-12 w-12 place-items-center rounded-lg bg-accent text-navy-950">
                      <Icon name={service.icon} className="h-6 w-6" />
                    </div>
                    <h3 className="text-lg font-extrabold">{service.title}</h3>
                    <p className="mt-3 leading-7 text-slate-300">{service.text}</p>
                  </motion.article>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function Contact() {
        const [sent, setSent] = useState(false);

        const handleSubmit = (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const data = new FormData(form);
          const name = data.get("name");
          const email = data.get("email");
          const message = data.get("message");
          const subject = encodeURIComponent(`Contacto desde portfolio - ${name}`);
          const body = encodeURIComponent(`Nombre: ${name}\nCorreo: ${email}\n\nMensaje:\n${message}`);
          setSent(true);
          window.location.href = `mailto:jheanpiervargas608@gmail.com?subject=${subject}&body=${body}`;
          form.reset();
        };

        return (
          <section id="contacto" className="bg-white px-5 py-24 sm:px-6 lg:px-8">
            <div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[0.85fr_1.15fr] lg:items-start">
              <motion.div
                variants={fadeUp}
                initial="hidden"
                whileInView="show"
                viewport={{ once: true, amount: 0.35 }}
                transition={{ duration: 0.55 }}
              >
                <p className="section-kicker mb-3 text-sm font-bold uppercase text-accent">Contacto</p>
                <h2 className="text-3xl font-extrabold text-navy-950 sm:text-4xl">
                  Hablemos de tu próximo proyecto.
                </h2>
                <p className="mt-5 text-lg leading-8 text-slate-600">
                  Disponible para apoyar en documentación técnica, metrados, presupuestos, coordinación y asistencia de obra.
                </p>

                <div className="mt-8 space-y-4">
                  <a
                    href="mailto:jhanpiervargas608@gmail.com"
                    className="flex items-center gap-4 rounded-lg border border-slate-200 p-4 transition hover:border-accent hover:bg-mist"
                  >
                    <span className="grid h-11 w-11 place-items-center rounded-lg bg-navy-950 text-white">
                      <Icon name="mail" className="h-5 w-5" />
                    </span>
                    <span>
                      <span className="block text-sm font-bold text-navy-950">Correo</span>
                      <span className="text-sm text-slate-600">jheanpiervargas608@gmail.com</span>
                    </span>
                  </a>
                  <div className="grid grid-cols-2 gap-3">
                    <a
                      href="https://www.linkedin.com/in/jhanpier-vargas"
                      target="_blank"
                      rel="noreferrer"
                      className="inline-flex items-center justify-center gap-2 rounded-lg bg-navy-950 px-4 py-3 text-sm font-extrabold text-white transition hover:bg-navy-800"
                    >
                      <Icon name="square-user-round" className="h-4 w-4" />
                      LinkedIn
                    </a>
                    <a
                      href="https://github.com/jhanpier-vargas"
                      target="_blank"
                      rel="noreferrer"
                      className="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 px-4 py-3 text-sm font-extrabold text-navy-950 transition hover:border-accent hover:text-accent"
                    >
                      <Icon name="git-branch" className="h-4 w-4" />
                      GitHub
                    </a>
                  </div>
                </div>
              </motion.div>

              <motion.form
                onSubmit={handleSubmit}
                className="rounded-lg border border-slate-200 bg-mist p-5 shadow-soft sm:p-8"
                initial={{ opacity: 0, y: 24 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true, amount: 0.3 }}
                transition={{ duration: 0.55 }}
              >
                <div className="grid gap-5 sm:grid-cols-2">
                  <label className="block">
                    <span className="mb-2 block text-sm font-bold text-navy-950">Nombre</span>
                    <input
                      name="name"
                      required
                      type="text"
                      className="h-12 w-full rounded-lg border border-slate-200 bg-white px-4 text-navy-950 outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/15"
                      placeholder="Tu nombre"
                    />
                  </label>
                  <label className="block">
                    <span className="mb-2 block text-sm font-bold text-navy-950">Correo</span>
                    <input
                      name="email"
                      required
                      type="email"
                      className="h-12 w-full rounded-lg border border-slate-200 bg-white px-4 text-navy-950 outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/15"
                      placeholder="tu@gmail.com"
                    />
                  </label>
                </div>
                <label className="mt-5 block">
                  <span className="mb-2 block text-sm font-bold text-navy-950">Mensaje</span>
                  <textarea
                    name="message"
                    required
                    rows="6"
                    className="w-full resize-none rounded-lg border border-slate-200 bg-white px-4 py-3 text-navy-950 outline-none transition focus:border-accent focus:ring-4 focus:ring-accent/15"
                    placeholder="Cuéntame qué necesitas desarrollar"
                  ></textarea>
                </label>
                <button
                  type="submit"
                  className="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-lg bg-navy-950 px-6 py-3 text-sm font-extrabold text-white transition hover:-translate-y-0.5 hover:bg-navy-800"
                >
                  <Icon name="send" className="h-5 w-5" />
                  Enviar mensaje
                </button>
                {sent && (
                  <p className="mt-4 rounded-lg bg-white px-4 py-3 text-sm font-semibold text-navy-800">
                    Se abrirá tu cliente de correo para completar el envío.
                  </p>
                )}
              </motion.form>
            </div>
          </section>
        );
      }

      function Footer() {
        return (
          <footer className="bg-navy-950 px-5 py-8 text-white sm:px-6 lg:px-8">
            <div className="mx-auto flex max-w-7xl flex-col items-center justify-between gap-4 text-center sm:flex-row sm:text-left">
              <p className="text-sm text-slate-300">
                © 2026 Jheanpier Vargas. Portfolio profesional de Ingeniería Civil.
              </p>
              <div className="flex items-center gap-2">
                <a
                  href="#inicio"
                  className="grid h-10 w-10 place-items-center rounded-lg border border-white/15 text-white transition hover:bg-white/10"
                  aria-label="Volver al inicio"
                  title="Volver al inicio"
                >
                  <Icon name="arrow-up" className="h-5 w-5" />
                </a>
              </div>
            </div>
          </footer>
        );
      }

      function App() {
        useEffect(() => {
          window.lucide?.createIcons();
        });

        const transition = useMemo(() => ({ duration: 0.45, ease: "easeOut" }), []);

        return (
          <MotionConfig transition={transition} reducedMotion="user">
            <Navbar />
            <main>
              <Hero />
              <About />
              <Skills />
              <Projects />
              <Services />
              <Contact />
            </main>
            <Footer />
          </MotionConfig>
        );
      }

      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
